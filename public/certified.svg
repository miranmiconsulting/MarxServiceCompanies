<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" role="img" aria-label="Gutter Helmet Certified Installer">
  <defs>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2EA043"/>
      <stop offset="1" stop-color="#1F7A33"/>
    </linearGradient>
  </defs>
  <!-- outer ring -->
  <circle cx="70" cy="70" r="58" fill="#FFFFFF" stroke="#1F7A33" stroke-width="3"/>
  <circle cx="70" cy="70" r="50" fill="none" stroke="#1F7A33" stroke-width="1" stroke-dasharray="2 3"/>
  <!-- top ribbon arc text -->
  <path id="topArc" d="M22,70 a48,48 0 0 1 96,0" fill="none"/>
  <text font-family="-apple-system, sans-serif" font-weight="800" font-size="11" fill="#1F7A33" letter-spacing="1.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">GUTTER HELMET</textPath>
  </text>
  <!-- bottom arc text -->
  <path id="botArc" d="M22,70 a48,48 0 0 0 96,0" fill="none"/>
  <text font-family="-apple-system, sans-serif" font-weight="800" font-size="11" fill="#1F7A33" letter-spacing="1.5">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">INSTALLER</textPath>
  </text>
  <!-- center: CERTIFIED ribbon -->
  <rect x="22" y="58" width="96" height="26" fill="url(#ribbon)"/>
  <polygon points="22,58 12,68 22,84" fill="#175E27"/>
  <polygon points="118,58 128,68 118,84" fill="#175E27"/>
  <text x="70" y="76" font-family="-apple-system, sans-serif" font-weight="900" font-size="14" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">CERTIFIED</text>
  <!-- check mark -->
  <circle cx="70" cy="46" r="7" fill="#1F7A33"/>
  <path d="M66.5 46 l2.5 2.5 5 -5" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
